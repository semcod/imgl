[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nlp2imgl"
version = "0.1.0"
description = "Natural language to imgl control DSL"
requires-python = ">=3.10"
dependencies = ["dsl2imgl>=0.1.0", "imgl>=0.7.1"]

[project.scripts]
nlp2imgl = "nlp2imgl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
