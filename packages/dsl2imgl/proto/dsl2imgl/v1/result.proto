syntax = "proto3";
package dsl2imgl.v1;

import "dsl2imgl/v1/command.proto";

message DslResult {
  bool ok = 1;
  string verb = 2;
  string command = 3;
  string action = 4;
  string output = 5;
  bytes data_json = 6;
  string error = 7;
  string event_id = 8;
}

message DslEvent {
  string id = 1;
  int64 ts_unix = 2;
  DslEnvelope command = 3;
  DslResult result = 4;
  string correlation_id = 5;
}
